name: Publish magi-server to npm

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Magi-System build run ID"
        required: true
        type: string
      tarball_sha256:
        description: "SHA256 of tarball (64-char hex)"
        required: true
        type: string

concurrency:
  group: npm-publish-magi-server
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # npm-publish environment は @candidate/@latest 昇格のみに使用。@staging は承認不要
    # (無承認で実行できるぶん、Magi-Systemでの正当なビルドrun由来であることをAPIで検証する)。
    steps:
      - name: Validate inputs
        env:
          RUN_ID: ${{ inputs.build_run_id }}
          SHA256: ${{ inputs.tarball_sha256 }}
        run: |
          [[ "$RUN_ID" =~ ^[0-9]+$ ]] || { echo "::error::Invalid run_id"; exit 1; }
          [[ "$SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "::error::Invalid sha256"; exit 1; }

      - name: Verify build run authenticity
        # dispatch元(publish-magi-server.yml)はこのstep自体をまだ実行中の場合があるため
        # status=completedになるまでbounded retryでポーリングする。
        env:
          GH_TOKEN: ${{ secrets.MAGI_SYSTEM_READONLY_PAT }}
          RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          RUN_JSON=""
          STATUS=""
          for i in $(seq 1 20); do
            RUN_JSON=$(gh api "repos/bash0816/Magi-System/actions/runs/$RUN_ID")
            STATUS=$(echo "$RUN_JSON" | jq -r '.status')
            [ "$STATUS" = "completed" ] && break
            echo "Run #$RUN_ID status=$STATUS, waiting... ($i/20)"
            sleep 5
          done
          [ "$STATUS" = "completed" ] || { echo "::error::Run did not complete in time (status=$STATUS)"; exit 1; }

          NAME=$(echo "$RUN_JSON" | jq -r '.name')
          PATH_=$(echo "$RUN_JSON" | jq -r '.path')
          EVENT=$(echo "$RUN_JSON" | jq -r '.event')
          CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion')
          BRANCH=$(echo "$RUN_JSON" | jq -r '.head_branch')
          [ "$NAME" = "Publish Magi Server" ] || { echo "::error::Unexpected workflow name: $NAME"; exit 1; }
          [ "$PATH_" = ".github/workflows/publish-magi-server.yml" ] || { echo "::error::Unexpected workflow path: $PATH_"; exit 1; }
          [ "$EVENT" = "workflow_dispatch" ] || { echo "::error::Unexpected event: $EVENT"; exit 1; }
          [ "$CONCLUSION" = "success" ] || { echo "::error::Run did not succeed: $CONCLUSION"; exit 1; }
          [ "$BRANCH" = "staging" ] || { echo "::error::Unexpected branch: $BRANCH"; exit 1; }
          echo "Run authenticity verified: $NAME #$RUN_ID (branch=$BRANCH, conclusion=$CONCLUSION)"

      - name: Download tarball from Magi-System internal release
        env:
          GH_TOKEN: ${{ secrets.MAGI_SYSTEM_READONLY_PAT }}
          RUN_ID: ${{ inputs.build_run_id }}
        run: |
          set -eu
          mkdir -p /tmp/magi-publish
          gh release download "magi-server-build-$RUN_ID" \
            --repo bash0816/Magi-System \
            --pattern '*.tgz' --pattern 'SHA256SUMS' \
            --dir /tmp/magi-publish
          ls -la /tmp/magi-publish/

      - name: Verify tarball sha256
        env:
          EXPECTED: ${{ inputs.tarball_sha256 }}
        run: |
          TGZ_FILES=(/tmp/magi-publish/bash0816-magi-server-*.tgz)
          [ "${#TGZ_FILES[@]}" -eq 1 ] || { echo "::error::Expected 1 tgz, found ${#TGZ_FILES[@]}"; exit 1; }
          ACTUAL=$(sha256sum "${TGZ_FILES[0]}" | awk '{print $1}')
          [ "$ACTUAL" = "$EXPECTED" ] || { echo "::error::sha256 mismatch (expected=$EXPECTED actual=$ACTUAL)"; exit 1; }
          echo "integrity OK: $ACTUAL"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm as @staging
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TGZ_FILES=(/tmp/magi-publish/bash0816-magi-server-*.tgz)
          npm publish "${TGZ_FILES[0]}" --ignore-scripts --access public --tag staging

      - name: Cleanup
        if: always()
        run: |
          rm -rf "/tmp/magi-publish" || true
